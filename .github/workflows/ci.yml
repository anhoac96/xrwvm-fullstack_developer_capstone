name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r server/requirements.txt flask nltk

      - name: Run Django system check
        working-directory: server
        run: python manage.py check

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            server/frontend/package-lock.json
            server/database/package-lock.json

      - name: Install frontend dependencies
        working-directory: server/frontend
        run: npm ci

      - name: Build frontend
        working-directory: server/frontend
        run: npm run build

      - name: Install API dependencies
        working-directory: server/database
        run: npm install

      - name: Validate Express API syntax
        working-directory: server/database
        run: node --check app.js
